<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Slide fonts. The server renderer waits for document.fonts.ready. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #0e1024; }
    #slides { display: flex; flex-direction: column; gap: 40px; padding: 40px; }
    .ml-slide { width: 1080px; height: 1080px; position: relative; overflow: hidden; background: #121331; }
  </style>
  <script src="slide-render.js"></script>
</head>
<body>
  <div id="slides"></div>
  <script>
    // Render slides from window.__SLIDES__ (set by Playwright via addInitScript
    // or by ?data=<base64-json>). Each becomes a .ml-slide div the renderer
    // screenshots individually.
    function getData() {
      if (window.__SLIDES__) return window.__SLIDES__;
      return { handle: "metalifeai.com", post: {
        template: "cover", kicker: "NEW DRIVING-SIM RESEARCH",
        headline: "Augmented reality windshield overlays slash driver blind-spot misses by 38%",
        summary: "A closed-course study with 42 drivers.",
        details: ["Researchers instrumented test vehicles with an AR head-up display that renders pedestrians hidden behind the A-pillar.",
                  "Across 42 participants the system reduced missed detections from 21% to 13%, a relative improvement of 38%.",
                  "Older drivers benefited most, though the trial was on a closed course and real-world validation is pending."],
        thank_you: true } };
    }
    async function build() {
      window.__SLIDES_READY__ = false;
      const data = getData();
      // make sure the slide fonts are loaded before measuring/fitting
      if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch (e) {} }
      window.MLSlides.renderInto(document.getElementById("slides"), data.post || {}, { handle: data.handle });
      window.__SLIDES_READY__ = true;
    }
    build();
    window.renderSlides = build;
  </script>
</body>
</html>
