name: Publish to LinkedIn

# Triggered ONLY on demand by the dashboard's "Post to LinkedIn" button, which
# marks a draft "queued" (committed via the API) and dispatches this workflow,
# passing your LinkedIn token + author URN as one-time inputs (kept only in your
# browser, never stored as repo secrets). Publishes every queued draft.
on:
  workflow_dispatch:
    inputs:
      linkedin_token:
        description: "LinkedIn access token (w_member_social)"
        required: false
        default: ""
      linkedin_urn:
        description: "LinkedIn author URN, e.g. urn:li:person:xxxx"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: linkedin-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Mask supplied credentials
        run: |
          [ -n "${{ github.event.inputs.linkedin_token }}" ] && echo "::add-mask::${{ github.event.inputs.linkedin_token }}" || true
          [ -n "${{ github.event.inputs.linkedin_urn }}" ] && echo "::add-mask::${{ github.event.inputs.linkedin_urn }}" || true

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Publish queued drafts to LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ github.event.inputs.linkedin_token || secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ github.event.inputs.linkedin_urn || secrets.LINKEDIN_AUTHOR_URN }}
        run: python -m src.main publish

      - name: Commit publish results
        run: |
          git config user.name "linkedin-bot"
          git config user.email "linkedin-bot@users.noreply.github.com"
          git add -A docs/data state
          git diff --cached --quiet || git commit -m "bot: publish results [skip ci]"
          git pull --rebase origin ${GITHUB_REF_NAME}
          git push
