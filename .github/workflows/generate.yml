name: Generate LinkedIn drafts

# Keys are supplied per-run by the dashboard as inputs (kept only in your
# browser). They are NOT stored as repo secrets. The optional cron only does
# useful work if you separately add repo secrets — otherwise it no-ops, and the
# real hourly cadence comes from the dashboard timer (while the tab is open).
on:
  workflow_dispatch:
    inputs:
      gemini_keys:
        description: "Comma/newline-separated Gemini API keys"
        required: false
        default: ""
      groq_key:
        description: "Groq API key (optional fallback)"
        required: false
        default: ""
  schedule:
    - cron: "5 * * * *"

permissions:
  contents: write
  models: read               # GitHub Models fallback when Gemini is unreachable

concurrency:
  group: linkedin-generate
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Mask supplied keys
        run: |
          [ -n "${{ github.event.inputs.gemini_keys }}" ] && echo "::add-mask::${{ github.event.inputs.gemini_keys }}" || true
          [ -n "${{ github.event.inputs.groq_key }}" ] && echo "::add-mask::${{ github.event.inputs.groq_key }}" || true

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate drafts (fetch -> AI select -> compose)
        env:
          # dashboard-supplied input first, repo secret as optional fallback
          GEMINI_API_KEYS: ${{ github.event.inputs.gemini_keys || secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ github.event.inputs.groq_key || secrets.GROQ_API_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_POSTS_PER_RUN: ${{ vars.MAX_POSTS_PER_RUN || '2' }}
          MAX_PENDING_DRAFTS: ${{ vars.MAX_PENDING_DRAFTS || '30' }}
        run: python -m src.main generate

      - name: Commit new drafts + state
        run: |
          git config user.name "linkedin-bot"
          git config user.email "linkedin-bot@users.noreply.github.com"
          git add -A docs/data state
          git diff --cached --quiet || git commit -m "bot: generated drafts [skip ci]"
          git pull --rebase origin ${GITHUB_REF_NAME}
          git push
